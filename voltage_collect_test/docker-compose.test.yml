services:
  monitor:
    build: .
    stdin_open: true
    tty: true
    environment:
      PLC_IP:           ${PLC_IP:-192.168.0.10}
      PLC_PORT:         ${PLC_PORT:-5007}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-1000}
      PG_HOST:          postgres
      PG_PORT:          ${PG_PORT:-5432}
      PG_USER:          ${PG_USER:-postgres}
      PG_PASSWORD:      ${PG_PASSWORD:-postgres}
      PG_DATABASE:      ${PG_DATABASE:-plc_test}
      WEB_PORT:         ${WEB_PORT:-4000}
    ports:
      - "${WEB_PORT:-4000}:${WEB_PORT:-4000}"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_DB:       ${PG_DATABASE:-plc_test}
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql/data   # 不持久化，容器停止後資料消失
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-plc_test}"]
      interval: 5s
      timeout: 5s
      retries: 10
